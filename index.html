<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Negocio Web</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
    <h1>Mi Negocio</h1>
    <p>Soluciones digitales modernas</p>
    <a href="#contacto" class="btn">Contáctame</a>
</header>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#servicios">Servicios</a>
    <a href="#galeria">Galería</a>
    <a href="#contacto">Contacto</a>
</nav>

<section id="inicio" class="fade">
    <h2>Bienvenido</h2>
    <p>Ofrecemos servicios profesionales para ayudarte a crecer.</p>
</section>

<section id="servicios" class="fade">
    <h2>Servicios</h2>
    <div class="cards">
        <div class="card">💻 Diseño Web</div>
        <div class="card">🔧 Soporte Técnico</div>
        <div class="card">📱 Apps y Sistemas</div>
    </div>
</section>

<section id="galeria" class="fade">
    <h2>Galería</h2>
    <div class="galeria">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
    </div>
</section>

<section id="contacto" class="fade">
    <h2>Contacto</h2>
    <form>
        <input type="text" placeholder="Nombre" required>
        <input type="email" placeholder="Correo" required>
        <textarea placeholder="Mensaje"></textarea>
        <button>Enviar</button>
    </form>
</section>

<a href="https://wa.me/18090000000" class="whatsapp">💬</a>

<footer>
    <p>© 2026 Mi Negocio</p>
</footer>

</body>
</html>
